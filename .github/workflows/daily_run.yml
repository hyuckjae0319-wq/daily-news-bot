name: Daily News Alarm

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
            echo "[ERROR] TELEGRAM_TOKEN secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CHAT_ID }}" ]; then
            echo "[ERROR] CHAT_ID secret is not set."
            exit 1
          fi
          echo "[OK] Secrets verified."

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Asia/Seoul
        run: python main.py
